<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | Cyber Infrastructure Defense Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/map.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header id="soc-header">
        <div class="header-left">
            <img src="logo.jpeg" alt="AEGIS" class="header-logo">
        </div>
        <div class="header-right">
            <div class="threat-counter" id="threat-counter">
                <span class="tc-label">ACTIVE THREATS</span>
                <span class="tc-count" id="tc-active">--</span>
            </div>
            <div class="status-indicator" id="system-status">SYSTEM ONLINE</div>
            <div class="clock" id="live-clock"></div>
        </div>
    </header>

    <!-- ═══════════════════ MAIN GRID ═══════════════════ -->
    <main class="soc-grid">

        <!-- ── LEFT COLUMN ── -->
        <div class="col-left">

            <!-- Schema Console -->
            <div class="panel schema-drawer" id="schema-drawer">
                <div class="panel-header" id="schema-toggle">
                    <span class="panel-title">SCHEMA CONSOLE</span>
                    <span class="drawer-arrow" id="schema-arrow">▲</span>
                </div>
                <div class="drawer-body" id="schema-body">
                    <div class="terminal" id="schema-log">
                        <span>> INITIALIZING SCHEMA ENGINE...</span>
                    </div>
                </div>
            </div>

            <!-- Asset Registry -->
            <div class="panel asset-panel">
                <div class="panel-header">
                    <span class="panel-title">ASSET REGISTRY</span>
                    <span class="badge">LIVE</span>
                </div>
                <div class="table-container">
                    <table id="asset-table">
                        <thead>
                            <tr>
                                <th>NODE</th>
                                <th>SERIAL</th>
                                <th>SCORE</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="asset-list"></tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- ── RIGHT SECTION: MAP ── -->
        <div class="col-right">
            <div class="panel map-hero">
                <div class="panel-header">
                    <span class="panel-title">FORENSIC CITY MAP</span>
                    <div class="map-legend">
                        <span class="legend-dot green"></span>HEALTHY
                        <span class="legend-dot yellow"></span>UNSTABLE
                        <span class="legend-dot red"></span>COMPROMISED
                    </div>
                </div>
                <div class="map-body">
                    <div id="d3-city-map"></div>
                    <!-- Inspector Panel -->
                    <div class="inspector-panel" id="node-inspector">
                        <div class="inspector-close" id="inspector-close">✕</div>
                        <div class="inspector-content">
                            <div class="empty-state">Select a node to inspect</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── HEATMAP SECTION ── -->
        <div class="heatmap-strip expanded" id="heatmap-strip">
            <div class="strip-header" id="heatmap-toggle">
                <span>📈 SLEEPER HEATMAP — Latency Intelligence Timeline</span>
                <span class="drawer-arrow" id="heatmap-arrow">▲</span>
            </div>
            <div class="strip-body" id="heatmap-body">
                <canvas id="heatmapChart"></canvas>
            </div>
        </div>

    </main>

    <!-- Floating tooltip -->
    <div id="aegis-tooltip" class="aegis-tooltip"></div>

    <script src="js/ws_stream.js"></script>
    <script type="module" src="js/app.js"></script>
    <script src="js/heatmap.js"></script>
</body>
</html>
